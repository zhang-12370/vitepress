# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["gh-pages"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Fix asset base paths for GitHub Pages subpath
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -n "$BASE_PATH" ] && [ "$BASE_PATH" != "/" ]; then
            find . -name "*.html" ! -path "./.git/*" | while read file; do
              sed -i \
                -e "s|href=\"/assets/|href=\"${BASE_PATH}/assets/|g" \
                -e "s|src=\"/assets/|src=\"${BASE_PATH}/assets/|g" \
                -e "s|href=\"/vp-icons.css\"|href=\"${BASE_PATH}/vp-icons.css\"|g" \
                -e "s|\\\\\"base\\\\\":\\\\\"/\\\\\"|\\\\\"base\\\\\":\\\\\"${BASE_PATH}/\\\\\"|g" \
                "$file"
            done
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
